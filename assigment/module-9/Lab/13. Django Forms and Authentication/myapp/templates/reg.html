<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* Transparent Container */
.container {
    width: 100%;
    max-width: 400px;
    padding: 30px;
    border-radius: 10px;

    background: rgba(255, 255, 255, 0.1); /* transparent */
    backdrop-filter: blur(10px); /* glass effect */

    border: 1px solid rgba(255,255,255,0.3);
}

/* Heading */
h2 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;

    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 5px;

    background: transparent;
    color: white;
}

/* Placeholder color */
input::placeholder {
    color: #ddd;
}

/* Button */
button {
    width: 100%;
    padding: 10px;

    background: white;
    color: black;

    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #ddd;
}

/* Messages */
.text-danger {
    color: #ff4d4d;
    text-align: center;
}

.text-success {
    color: #00ffae;
    text-align: center;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 15px;
    color: white;
}

.footer a {
    color: #fff;
}
</style>
</head>

<body>

<div class="container">
    <h2>Register</h2>

    {% if err %}
        <div class="text-danger">{{ err }}</div>
    {% endif %}

    {% if msg %}
        <div class="text-success">{{ msg }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="fname" placeholder="First Name" required>
        <input type="text" name="lname" placeholder="Last Name" required>
        <input type="text" name="uname" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="footer">
        Already have an account? 
        <a href="{% url 'loginpage' %}">Login</a>
    </div>
</div>

</body>
</html>
