<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    height: 100vh;
    background: linear-gradient(135deg, #0a0f1c, #1a2328, #2b3a42);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* Transparent Container */
.container {
    width: 100%;
    max-width: 350px;
    padding: 30px;
    border-radius: 12px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.2);
}

/* Heading */
h2 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

/* Error Message */
.text-danger {
    color: #ff4d4d;
    text-align: center;
    margin-bottom: 10px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;

    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.6);

    color: white;
    outline: none;
}

/* Placeholder */
input::placeholder {
    color: #ccc;
}

/* Button */
button {
    width: 100%;
    padding: 10px;

    background: rgba(255,255,255,0.9);
    color: black;

    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* Hover */
button:hover {
    background: #ddd;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 15px;
    color: #ccc;
}

.footer a {
    color: #00e0ff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    {% if err %}
        <div class="text-danger">{{ err }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="uname" placeholder="Username" required>
        <input type="password" name="pwd" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Don't have an account? 
        <a href="{% url 'reg' %}">Register</a>
    </div>
</div>

</body>
</html>
