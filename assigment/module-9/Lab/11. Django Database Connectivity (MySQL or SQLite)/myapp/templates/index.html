<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #0f172a;
        color: #fff;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 32px;
    }

    form {
        max-width: 420px;
        margin: auto;
        padding: 25px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    form label {
        font-size: 14px;
        display: block;
        margin-bottom: 5px;
        color: #cbd5f5;
    }

    form input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    form input:focus {
        box-shadow: 0 0 10px #38bdf8;
    }

    form input[type="submit"] {
        background: linear-gradient(45deg, #38bdf8, #6366f1);
        cursor: pointer;
        font-weight: bold;
    }

    .message {
        max-width: 420px;
        margin: 10px auto;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        background: rgba(34,197,94,0.2);
        color: #4ade80;
    }

    table {
        width: 95%;
        margin: 30px auto;
        border-collapse: collapse;
        border-radius: 12px;
        overflow: hidden;
        background: rgba(255,255,255,0.05);
    }

    table th {
        background: rgba(99,102,241,0.6);
        padding: 12px;
    }

    table td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    a {
        padding: 6px 12px;
        border-radius: 6px;
        text-decoration: none;
        color: white;
        font-size: 13px;
    }

    a[href*="delete"] {
        background: #ef4444;
    }

    a[href*="update"] {
        background: #22c55e;
    }
</style>
</head>

<body>

<h1>Doctor Form</h1>

{% for message in messages %}
    <div class="message">{{message}}</div>
{% endfor %}

<form action="" method="post">
    {% csrf_token %}
    <input type="hidden" name="id" value="{{doc.id}}">

    <label>Doctor Name</label>
    <input type="text" name="name" placeholder="Enter doctor name" value="{{doc.name}}">

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter email" value="{{doc.email}}">

    <label>Specialization</label>
    <input type="text" name="specialization" placeholder="Enter specialization" value="{{doc.specialization}}">

    <label>Experience (Years)</label>
    <input type="number" name="experience" placeholder="Enter experience" value="{{doc.experience}}">

    <input type="submit" value="Submit">
</form>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Specialization</th>
        <th>Experience</th>
        <th colspan="2">Action</th>
    </tr>

    {% for i in doctors %}
    <tr>
        <td>{{i.id}}</td>
        <td>{{i.name}}</td>
        <td>{{i.email}}</td>
        <td>{{i.specialization}}</td>
        <td>{{i.experience}}</td>
        <td><a href="{% url 'delete' %}?dele={{ i.id }}">Delete</a></td>
        <td><a href="{% url 'update' %}?uid={{ i.id }}">Update</a></td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
