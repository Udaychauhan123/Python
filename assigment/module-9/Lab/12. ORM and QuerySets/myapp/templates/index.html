<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Finder</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2328, #2b3a42);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            color: #fff;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 15px;
            width: 340px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            margin-bottom: 40px;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .input-group input:focus,
        .input-group select:focus {
            border: 1px solid #00d4ff;
            box-shadow: 0 0 8px #00d4ff;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00d4ff, #00aacc);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00d4ff;
        }

        table {
            width: 85%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        table th {
            background: rgba(0, 212, 255, 0.3);
            padding: 12px;
            text-transform: uppercase;
            font-size: 13px;
        }

        table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        table tr:hover {
            background: rgba(255,255,255,0.1);
        }

        table a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            table {
                width: 100%;
                font-size: 12px;
            }

            .form-container {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- DOCTOR FORM -->
    <div class="form-container">
        <h2>Doctor Profile</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="id" value="{{doctor.id}}">

            <div class="input-group">
                <label>Doctor Name</label>
                <input type="text" name="name" value="{{doctor.name}}" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" value="{{doctor.email}}" required>
            </div>

            <div class="input-group">
                <label>Specialization</label>
                <input type="text" name="specialization" placeholder="Cardiologist, Dentist..." value="{{doctor.specialization}}" required>
            </div>

            <div class="input-group">
                <label>Experience (Years)</label>
                <input type="number" name="experience" value="{{doctor.experience}}" required>
            </div>

            <div class="input-group">
                <label>Contact Number</label>
                <input type="text" name="contact" value="{{doctor.contact}}" required>
            </div>

            <button type="submit">Save Doctor</button>
        </form>
    </div>

    <!-- DOCTOR TABLE -->
    <table>
        <tr>
            <th>#</th>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Contact</th>
            <th colspan="2">Action</th>
        </tr>

        {% for d in doctors %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ d.id }}</td>
            <td>{{ d.name }}</td>
            <td>{{ d.email }}</td>
            <td>{{ d.specialization }}</td>
            <td>{{ d.experience }} yrs</td>
            <td>{{ d.contact }}</td>

            <td><a href="{% url 'update' %}?uid={{ d.id }}">Update</a></td>
            <td>
                <a href="{% url 'delete' %}?did={{ d.id }}"
                   onclick="return confirm('Delete this doctor?')">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
