<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Finder</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        .card {
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h3 {
            color: #38bdf8;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(45deg, #38bdf8, #6366f1);
            border: none;
        }

        .table {
            background: rgba(255,255,255,0.05);
        }
    </style>

    <script>

        $(document).ready(function () {
            load()
            $("#ubtn").hide()
        })

        const load = () => {
            $.get("display", {}, function (rt) {

                let rows = ""
                rt.doctors.map(ele => {
                    rows += `<tr>
                        <td>${ele.id}</td>
                        <td>${ele.name}</td>
                        <td>${ele.specialization}</td>
                        <td>${ele.experience} yrs</td>
                        <td>${ele.phone}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick='editdoctor(${ele.id})'>Edit</button>
                            <button class="btn btn-danger btn-sm" onclick='deletedoctor(${ele.id})'>Delete</button>
                        </td>
                    </tr>`
                })

                $("#tdata").html(rows)
            })
        }

        const search = (q) => {
            $.get("search", { q }, function (rt) {

                let rows = ""
                rt.doctors.map(ele => {
                    rows += `<tr>
                        <td>${ele.id}</td>
                        <td>${ele.name}</td>
                        <td>${ele.specialization}</td>
                        <td>${ele.experience} yrs</td>
                        <td>${ele.phone}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick='editdoctor(${ele.id})'>Edit</button>
                            <button class="btn btn-danger btn-sm" onclick='deletdDoctor(${ele.id})'>Delete</button>
                        </td>
                    </tr>`
                })

                $("#tdata").html(rows)
            })
        }

        const adddoctor = () => {

            let name = $("#name").val()
            let specialization = $("#specialization").val()
            let experience = $("#experience").val()
            let phone = $("#phone").val()
            let csrfmiddlewaretoken = $('input[name="csrfmiddlewaretoken"]').val()

            $.post("adddoctor", { csrfmiddlewaretoken, name, specialization, experience, phone }, function (rt) {
                alert(rt)
                load()
            })
        }

        const deletedoctor = (id) => {
            $.get("deletedoctor", { id }, function (rt) {
                alert(rt)
                load()
            })
        }

        const editdoctor = (id) => {
            $.get("editdoctor", { id }, function (rt) {

                let d = rt.doctor[0]

                $("#id").val(d.id)
                $("#name").val(d.name)
                $("#specialization").val(d.specialization)
                $("#experience").val(d.experience)
                $("#phone").val(d.phone)

                $("#ubtn").show()
                $("#sbtn").hide()
            })
        }

        const updatedoctor = () => {

            let id = $("#id").val()
            let name = $("#name").val()
            let specialization = $("#specialization").val()
            let experience = $("#experience").val()
            let phone = $("#phone").val()
            let csrfmiddlewaretoken = $('input[name="csrfmiddlewaretoken"]').val()

            $.post("updatedoctor", { csrfmiddlewaretoken, id, name, specialization, experience, phone }, function (rt) {
                alert(rt)
                load()

                $("#ubtn").hide()
                $("#sbtn").show()
            })
        }

    </script>

</head>

<body>

    <div class="container mt-5">

        <!-- Form -->
        <div class="card p-4">
            <h3 class="text-center">Doctor Form</h3>

            <input type="hidden" id="id">
            {% csrf_token %}

            <div class="row g-3 mt-2">

                <div class="col-md-3">
                    <input type="text" id="name" name="name" class="form-control" placeholder="Doctor Name">
                </div>

                <div class="col-md-3">
                    <input type="text" id="specialization" name="specialization" class="form-control" placeholder="Specialization">
                </div>

                <div class="col-md-2">
                    <input type="number" id="experience" name="experience" class="form-control" placeholder="Experience">
                </div>

                <div class="col-md-2">
                    <input type="text" id="phone" name="phone" class="form-control" placeholder="Phone">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100" id="sbtn" onclick="adddoctor()">Add</button>
                    <button class="btn btn-primary w-100" id="ubtn" onclick="updatedoctor()">Update</button>
                </div>

            </div>
        </div>

        <!-- Table -->
        <div class="card p-4 mt-4">
            <h3 class="text-center">Doctor Data</h3>

            <input type="text" class="form-control mb-3" placeholder="Search doctor..." onkeyup="search(value)">

            <table class="table text-center">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Experience</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tdata"></tbody>

            </table>
        </div>

    </div>

</body>
</html>
