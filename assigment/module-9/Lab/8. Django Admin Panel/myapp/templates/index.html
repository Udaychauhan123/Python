<!DOCTYPE html>
<html>
<head>
    <title>Doctor Information</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2328, #2b3a42);
            color: white;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        /* Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 20px rgba(0,198,255,0.6);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .card p {
            font-size: 0.9rem;
            color: #ccc;
            margin: 5px 0;
        }

        /* Tags */
        .tags {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        /* Button */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
        }

        /* Empty */
        .empty {
            text-align: center;
            margin-top: 50px;
            color: #ccc;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

<h1>Doctor Information</h1>

<div class="container">

{% for d in doctors %}
<div class="card">
    <h3>{{ d.name }}</h3>

    <p><b>Specialization:</b> {{ d.specialization }}</p>

    <div class="tags">
        <span class="tag">{{ d.experience }} Years</span>
        <span class="tag">₹{{ d.fees }}</span>
    </div>

    <!-- Optional detail button -->
    {% comment %} <a href="/doctor/{{ d.id }}/" class="btn">View Details</a> {% endcomment %}
</div>

{% empty %}
<p class="empty">No doctors available</p>
{% endfor %}

</div>

</body>
</html>
