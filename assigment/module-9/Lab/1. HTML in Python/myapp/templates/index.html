<!DOCTYPE html>
<html>
<head>
    <title>Django Template</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a2328, #2b3a42);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 60px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        span {
            color: #00ffd5;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Welcome <span>Doctor Finder</span></h1>
    </div>

</body>
</html>
